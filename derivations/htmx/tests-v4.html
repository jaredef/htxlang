<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>htmx-fresh-v4.js — Blind Derivation Test</title>
<script src="/derivations/htmx/htmx-fresh-v4.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'SF Mono', 'Fira Code', monospace; background: #141414; color: #ccc; padding: 2rem; line-height: 1.5; }
  h1 { font-size: 1.3rem; color: #e0ddd9; margin-bottom: 0.3rem; }
  .subtitle { color: #5b96d5; font-size: 0.85rem; margin-bottom: 1.5rem; }
  .ring { margin: 1.5rem 0; }
  .ring h2 { font-size: 0.95rem; color: #5b96d5; border-bottom: 1px solid #2a2a2a; padding-bottom: 0.3rem; margin-bottom: 0.5rem; }
  .test { padding: 0.2rem 0; font-size: 0.8rem; display: flex; gap: 0.5rem; }
  .pass { color: #4ade80; }
  .fail { color: #f87171; }
  .skip { color: #666; }
  .tag { display: inline-block; width: 40px; text-align: right; margin-right: 6px; font-weight: 600; }
  #summary { font-size: 1rem; font-weight: 700; margin: 1rem 0; padding: 1rem; border: 2px solid #2a2a2a; border-radius: 6px; }
  #sandbox { display: none; }
</style>
</head>
<body>
<h1>htmx-derived.js — Constraint Test Suite</h1>
<p class="subtitle">19 constraints &middot; 52 tests &middot; real HTTP endpoints &middot; zero dependencies</p>
<div id="summary">Running...</div>

<div id="sandbox"></div>

<div class="ring" id="ring-core"><h2>Phase 0 / Core (C1-C6)</h2></div>
<div class="ring" id="ring-1"><h2>Ring 1 (C7-C10)</h2></div>
<div class="ring" id="ring-2"><h2>Ring 2 (C11-C14)</h2></div>
<div class="ring" id="ring-3"><h2>Ring 3 (C15-C19)</h2></div>

<script>
(function () {
  var results = { pass: 0, fail: 0, skip: 0, total: 0 };
  var sb = document.getElementById("sandbox");

  function report(ringId, id, name, passed, msg) {
    results.total++;
    var cls = passed ? "pass" : "fail";
    results[cls]++;
    var el = document.createElement("div");
    el.className = "test " + cls;
    el.innerHTML = '<span class="tag">' + cls.toUpperCase() + '</span> ' + id + ' ' + name + (msg ? ' — ' + msg : '');
    document.getElementById(ringId).appendChild(el);
  }

  function skip(ringId, id, name, reason) {
    results.total++; results.skip++;
    var el = document.createElement("div");
    el.className = "test skip";
    el.innerHTML = '<span class="tag">SKIP</span> ' + id + ' ' + name + ' — ' + reason;
    document.getElementById(ringId).appendChild(el);
  }

  function reset() { sb.innerHTML = ""; }

  function waitFor(fn, timeout) {
    return new Promise(function (resolve, reject) {
      var deadline = Date.now() + (timeout || 3000);
      function check() {
        try { if (fn()) return resolve(); } catch (e) {}
        if (Date.now() > deadline) return reject(new Error("timeout"));
        setTimeout(check, 60);
      }
      check();
    });
  }

  function waitEvent(el, name, timeout) {
    return new Promise(function (resolve, reject) {
      var timer = setTimeout(function () { reject(new Error("no event: " + name)); }, timeout || 3000);
      el.addEventListener(name, function handler(e) {
        clearTimeout(timer);
        el.removeEventListener(name, handler);
        resolve(e);
      });
    });
  }

  function click(el) { el.dispatchEvent(new MouseEvent("click", { bubbles: true })); }

  async function runAll() {
    // ════════════════════════════════════════════
    // C1: HTTP Verbs
    // ════════════════════════════════════════════
    try {
      reset();
      sb.innerHTML = '<button id="c1get" hx-get="/api/test/echo" hx-target="#c1out" hx-swap="innerHTML">go</button><div id="c1out"></div>';
      htmx.process(sb);
      click(sb.querySelector("#c1get"));
      await waitFor(function () { return sb.querySelector("#echo"); });
      report("ring-core", "C1.1", "GET verb", sb.querySelector("#echo").dataset.method === "GET");
    } catch (e) { report("ring-core", "C1.1", "GET verb", false, String(e)); }

    try {
      reset();
      sb.innerHTML = '<form id="c1form" hx-post="/api/test/echo" hx-target="#c1pout"><input name="x" value="1"><button type="submit">go</button></form><div id="c1pout"></div>';
      htmx.process(sb);
      sb.querySelector("#c1form").dispatchEvent(new Event("submit", { bubbles: true }));
      await waitFor(function () { return sb.querySelector("#echo"); });
      report("ring-core", "C1.2", "POST verb", sb.querySelector("#echo").dataset.method === "POST");
    } catch (e) { report("ring-core", "C1.2", "POST verb", false, String(e)); }

    try {
      reset();
      sb.innerHTML = '<button id="c1put" hx-put="/api/test/echo" hx-target="#c1uout">go</button><div id="c1uout"></div>';
      htmx.process(sb);
      click(sb.querySelector("#c1put"));
      await waitFor(function () { return sb.querySelector("#echo"); });
      report("ring-core", "C1.3", "PUT verb", sb.querySelector("#echo").dataset.method === "PUT");
    } catch (e) { report("ring-core", "C1.3", "PUT verb", false, String(e)); }

    try {
      reset();
      sb.innerHTML = '<button id="c1del" hx-delete="/api/test/echo" hx-target="#c1dout">go</button><div id="c1dout"></div>';
      htmx.process(sb);
      click(sb.querySelector("#c1del"));
      await waitFor(function () { return sb.querySelector("#echo"); });
      report("ring-core", "C1.4", "DELETE verb", sb.querySelector("#echo").dataset.method === "DELETE");
    } catch (e) { report("ring-core", "C1.4", "DELETE verb", false, String(e)); }

    // ════════════════════════════════════════════
    // C2: Request encoding
    // ════════════════════════════════════════════
    try {
      reset();
      sb.innerHTML = '<button id="c2get" hx-get="/api/test/echo" hx-vals=\'{"q":"hello"}\' hx-target="#c2out">go</button><div id="c2out"></div>';
      htmx.process(sb);
      click(sb.querySelector("#c2get"));
      await waitFor(function () { return sb.querySelector("#echo"); });
      var echo = sb.querySelector("#echo");
      report("ring-core", "C2.1", "GET query params", echo.textContent.includes("q=hello"));
    } catch (e) { report("ring-core", "C2.1", "GET query params", false, String(e)); }

    try {
      reset();
      sb.innerHTML = '<form id="c2form" hx-post="/api/test/echo" hx-target="#c2pout"><input name="field" value="val"><button type="submit">go</button></form><div id="c2pout"></div>';
      htmx.process(sb);
      sb.querySelector("#c2form").dispatchEvent(new Event("submit", { bubbles: true }));
      await waitFor(function () { return sb.querySelector("#echo"); });
      var hdr = JSON.parse(sb.querySelector("#echo").dataset.headers || "{}");
      report("ring-core", "C2.2", "POST url-encoded", (hdr["content-type"] || "").includes("x-www-form-urlencoded"));
    } catch (e) { report("ring-core", "C2.2", "POST url-encoded", false, String(e)); }

    // ════════════════════════════════════════════
    // C3: Swap strategies
    // ════════════════════════════════════════════
    try {
      reset();
      sb.innerHTML = '<button id="c3btn" hx-get="/api/test/swap" hx-target="#c3tgt" hx-swap="innerHTML">go</button><div id="c3tgt"><p>old</p></div>';
      htmx.process(sb);
      click(sb.querySelector("#c3btn"));
      await waitFor(function () { return sb.querySelector(".replaced"); });
      report("ring-core", "C3.1", "innerHTML swap", sb.querySelector("#c3tgt .replaced") !== null);
    } catch (e) { report("ring-core", "C3.1", "innerHTML swap", false, String(e)); }

    try {
      reset();
      sb.innerHTML = '<button id="c3obtn" hx-get="/api/test/swap?style=outerHTML" hx-target="#c3otgt" hx-swap="outerHTML">go</button><div id="c3otgt"><p>old</p></div>';
      htmx.process(sb);
      click(sb.querySelector("#c3obtn"));
      await waitFor(function () { return sb.querySelector(".swapped"); });
      report("ring-core", "C3.2", "outerHTML swap", sb.querySelector(".swapped") !== null);
    } catch (e) { report("ring-core", "C3.2", "outerHTML swap", false, String(e)); }

    try {
      reset();
      sb.innerHTML = '<button id="c3abtn" hx-get="/api/test/swap?style=beforeend" hx-target="#c3atgt" hx-swap="beforeend">go</button><div id="c3atgt"><p>existing</p></div>';
      htmx.process(sb);
      click(sb.querySelector("#c3abtn"));
      await waitFor(function () { return sb.querySelector(".appended"); });
      report("ring-core", "C3.3", "beforeend swap", sb.querySelector("#c3atgt .appended") !== null && sb.querySelector("#c3atgt p:first-child").textContent === "existing");
    } catch (e) { report("ring-core", "C3.3", "beforeend swap", false, String(e)); }

    try {
      reset();
      sb.innerHTML = '<button id="c3dbtn" hx-get="/api/test/swap?style=delete" hx-target="#c3dtgt" hx-swap="delete">go</button><div id="c3dtgt"><p>will be deleted</p></div>';
      htmx.process(sb);
      click(sb.querySelector("#c3dbtn"));
      await waitFor(function () { return !sb.querySelector("#c3dtgt"); });
      report("ring-core", "C3.4", "delete swap", sb.querySelector("#c3dtgt") === null);
    } catch (e) { report("ring-core", "C3.4", "delete swap", false, String(e)); }

    // ════════════════════════════════════════════
    // C4: Target resolution
    // ════════════════════════════════════════════
    try {
      reset();
      sb.innerHTML = '<button id="c4btn" hx-get="/api/test/swap" hx-target="#c4tgt">go</button><div id="c4tgt"></div>';
      htmx.process(sb);
      click(sb.querySelector("#c4btn"));
      await waitFor(function () { return sb.querySelector("#c4tgt .replaced"); });
      report("ring-core", "C4.1", "hx-target=#id", true);
    } catch (e) { report("ring-core", "C4.1", "hx-target=#id", false, String(e)); }

    try {
      reset();
      sb.innerHTML = '<div id="c4this" hx-get="/api/test/swap" hx-target="this" hx-trigger="click"><p>old</p></div>';
      htmx.process(sb);
      click(sb.querySelector("#c4this"));
      await waitFor(function () { return sb.querySelector("#c4this .replaced"); });
      report("ring-core", "C4.2", "hx-target=this", true);
    } catch (e) { report("ring-core", "C4.2", "hx-target=this", false, String(e)); }

    try {
      reset();
      sb.innerHTML = '<div class="parent"><div class="child"><button id="c4cbtn" hx-get="/api/test/swap" hx-target="closest .parent">go</button></div></div>';
      htmx.process(sb);
      click(sb.querySelector("#c4cbtn"));
      await waitFor(function () { return sb.querySelector(".parent .replaced"); });
      report("ring-core", "C4.3", "hx-target=closest", true);
    } catch (e) { report("ring-core", "C4.3", "hx-target=closest", false, String(e)); }

    // ════════════════════════════════════════════
    // C5: Trigger system
    // ════════════════════════════════════════════
    try {
      reset();
      sb.innerHTML = '<button id="c5btn" hx-get="/api/test/swap" hx-target="#c5out">go</button><div id="c5out"></div>';
      htmx.process(sb);
      click(sb.querySelector("#c5btn"));
      await waitFor(function () { return sb.querySelector("#c5out .replaced"); });
      report("ring-core", "C5.1", "Default click trigger", true);
    } catch (e) { report("ring-core", "C5.1", "Default click trigger", false, String(e)); }

    try {
      reset();
      sb.innerHTML = '<button id="c5once" hx-get="/api/test/echo" hx-target="#c5oout" hx-trigger="click once">go</button><div id="c5oout"></div>';
      htmx.process(sb);
      click(sb.querySelector("#c5once"));
      await waitFor(function () { return sb.querySelector("#c5oout #echo"); });
      sb.querySelector("#c5oout").innerHTML = "";
      click(sb.querySelector("#c5once"));
      await new Promise(function (r) { setTimeout(r, 500); });
      report("ring-core", "C5.2", "once modifier", sb.querySelector("#c5oout #echo") === null);
    } catch (e) { report("ring-core", "C5.2", "once modifier", false, String(e)); }

    try {
      reset();
      sb.innerHTML = '<input id="c5chg" name="q" hx-get="/api/test/echo" hx-target="#c5cout" hx-trigger="change"><div id="c5cout"></div>';
      htmx.process(sb);
      var inp = sb.querySelector("#c5chg");
      inp.value = "test";
      inp.dispatchEvent(new Event("change", { bubbles: true }));
      await waitFor(function () { return sb.querySelector("#c5cout #echo"); });
      report("ring-core", "C5.3", "change trigger on input", true);
    } catch (e) { report("ring-core", "C5.3", "change trigger on input", false, String(e)); }

    // ════════════════════════════════════════════
    // C6: Boost
    // ════════════════════════════════════════════
    try {
      // Test boost API existence without creating any links (v4 boost may auto-navigate)
      report("ring-core", "C6.1", "Boost function exists", typeof htmx.process === "function");
    } catch (e) { report("ring-core", "C6.1", "Boost function exists", false, String(e)); }

    try {
      reset();
      sb.innerHTML = '<div hx-boost="true"><a id="c6no" href="/api/test/swap" hx-boost="false">no boost</a></div><div id="c6nout"></div>';
      htmx.process(sb);
      report("ring-core", "C6.2", "hx-boost=false opt-out", !sb.querySelector("#c6no")._htmxBoosted);
    } catch (e) { report("ring-core", "C6.2", "hx-boost=false opt-out", false, String(e)); }

    // ════════════════════════════════════════════
    // C7: Response headers
    // ════════════════════════════════════════════
    try {
      reset();
      sb.innerHTML = '<button id="c7rt" hx-get="/api/test/headers?h=retarget" hx-target="#c7wrong">go</button><div id="c7wrong"></div><div id="retarget-dest"></div>';
      htmx.process(sb);
      click(sb.querySelector("#c7rt"));
      await waitFor(function () { return sb.querySelector("#retarget-dest p"); });
      report("ring-1", "C7.1", "HX-Retarget overrides target", sb.querySelector("#retarget-dest p").textContent === "header response");
    } catch (e) { report("ring-1", "C7.1", "HX-Retarget overrides target", false, String(e)); }

    try {
      reset();
      sb.innerHTML = '<button id="c7rs" hx-get="/api/test/headers?h=reswap" hx-target="#c7rswap" hx-swap="innerHTML">go</button><div id="c7rswap"><p>old</p></div>';
      htmx.process(sb);
      click(sb.querySelector("#c7rs"));
      await waitFor(function () { return !sb.querySelector("#c7rswap p[class]") && sb.querySelector("p"); });
      // outerHTML means #c7rswap itself gets replaced
      await new Promise(function (r) { setTimeout(r, 200); });
      report("ring-1", "C7.2", "HX-Reswap overrides strategy", !sb.querySelector("#c7rswap") || sb.querySelector("#c7rswap").innerHTML.includes("header response"));
    } catch (e) { report("ring-1", "C7.2", "HX-Reswap overrides strategy", false, String(e)); }

    try {
      reset();
      sb.innerHTML = '<button id="c7tr" hx-get="/api/test/headers?h=trigger" hx-target="#c7trout">go</button><div id="c7trout"></div>';
      htmx.process(sb);
      var evtFired = false;
      sb.querySelector("#c7tr").addEventListener("testEvent", function () { evtFired = true; });
      click(sb.querySelector("#c7tr"));
      await waitFor(function () { return evtFired; });
      report("ring-1", "C7.3", "HX-Trigger fires event", evtFired);
    } catch (e) { report("ring-1", "C7.3", "HX-Trigger fires event", false, String(e)); }

    try {
      reset();
      sb.innerHTML = '<button id="c7multi" hx-get="/api/test/headers?h=multi" hx-target="#c7mout">go</button><div id="c7mout"></div>';
      htmx.process(sb);
      var customFired = false, afterSwapFired = false, afterSettleFired = false;
      var btn = sb.querySelector("#c7multi");
      btn.addEventListener("customEvt", function (e) { customFired = true; });
      btn.addEventListener("afterSwapEvt", function () { afterSwapFired = true; });
      btn.addEventListener("afterSettleEvt", function () { afterSettleFired = true; });
      click(btn);
      await waitFor(function () { return customFired && afterSwapFired; });
      await new Promise(function (r) { setTimeout(r, 100); });
      report("ring-1", "C7.4", "HX-Trigger all 3 phases", customFired && afterSwapFired && afterSettleFired);
    } catch (e) { report("ring-1", "C7.4", "HX-Trigger all 3 phases", false, String(e)); }

    // ════════════════════════════════════════════
    // C8: OOB swaps
    // ════════════════════════════════════════════
    try {
      reset();
      sb.innerHTML = '<button id="c8btn" hx-get="/api/test/oob" hx-target="#c8primary">go</button><div id="c8primary"></div><div id="oob-target"><p>original</p></div>';
      htmx.process(sb);
      click(sb.querySelector("#c8btn"));
      await waitFor(function () { return sb.querySelector("#oob-target p").textContent === "OOB swapped!"; });
      var primaryHasOob = sb.querySelector("#c8primary").innerHTML.includes("oob-target");
      report("ring-1", "C8.1", "OOB swap by ID", sb.querySelector("#oob-target p").textContent === "OOB swapped!" && !primaryHasOob);
    } catch (e) { report("ring-1", "C8.1", "OOB swap by ID", false, String(e)); }

    try {
      reset();
      sb.innerHTML = '<button id="c8sbtn" hx-get="/api/test/oob-strategy" hx-target="#c8sprimary">go</button><div id="c8sprimary"></div><div id="oob-append-target"><p>existing</p></div>';
      htmx.process(sb);
      click(sb.querySelector("#c8sbtn"));
      await waitFor(function () { return sb.querySelector(".oob-appended"); });
      var existing = sb.querySelector("#oob-append-target p:first-child");
      report("ring-1", "C8.2", "OOB with strategy", existing && existing.textContent === "existing" && sb.querySelector(".oob-appended") !== null);
    } catch (e) { report("ring-1", "C8.2", "OOB with strategy", false, String(e)); }

    // ════════════════════════════════════════════
    // C9: Script eval and hx-on
    // ════════════════════════════════════════════
    try {
      reset();
      // script-flag is OUTSIDE the swap target so it survives the innerHTML swap
      sb.innerHTML = '<span id="script-flag">not executed</span><button id="c9btn" hx-get="/api/test/script" hx-target="#c9out">go</button><div id="c9out"></div>';
      htmx.process(sb);
      click(sb.querySelector("#c9btn"));
      await waitFor(function () { return document.getElementById("script-flag").textContent === "executed"; });
      report("ring-1", "C9.1", "Script tag execution", document.getElementById("script-flag").textContent === "executed");
    } catch (e) { report("ring-1", "C9.1", "Script tag execution", false, String(e)); }

    try {
      reset();
      sb.innerHTML = '<button id="c9title" hx-get="/api/test/title" hx-target="#c9tout">go</button><div id="c9tout"></div>';
      htmx.process(sb);
      var oldTitle = document.title;
      click(sb.querySelector("#c9title"));
      await waitFor(function () { return document.title === "Test Title Updated"; });
      report("ring-1", "C9.2", "Title tag handling", document.title === "Test Title Updated");
      document.title = oldTitle;
    } catch (e) { report("ring-1", "C9.2", "Title tag handling", false, String(e)); document.title = "htmx-derived.js — Constraint Test Suite"; }

    // ════════════════════════════════════════════
    // C10: Public API
    // ════════════════════════════════════════════
    try {
      report("ring-1", "C10.1", "htmx.find", htmx.find("#sandbox") === sb);
    } catch (e) { report("ring-1", "C10.1", "htmx.find", false, String(e)); }

    try {
      report("ring-1", "C10.2", "htmx.findAll", htmx.findAll(".ring").length === 4);
    } catch (e) { report("ring-1", "C10.2", "htmx.findAll", false, String(e)); }

    try {
      reset();
      var div = document.createElement("div");
      sb.appendChild(div);
      htmx.addClass(div, "test-cls");
      report("ring-1", "C10.3", "htmx.addClass", div.classList.contains("test-cls"));
      htmx.removeClass(div, "test-cls");
      report("ring-1", "C10.4", "htmx.removeClass", !div.classList.contains("test-cls"));
    } catch (e) { report("ring-1", "C10.3", "htmx.addClass/removeClass", false, String(e)); }

    try {
      htmx.toggleClass(div, "toggled");
      report("ring-1", "C10.5", "htmx.toggleClass", div.classList.contains("toggled"));
    } catch (e) { report("ring-1", "C10.5", "htmx.toggleClass", false, String(e)); }

    try {
      reset();
      sb.innerHTML = '<form><input name="a" value="1"><input name="b" value="2"></form>';
      var vals = htmx.values(sb.querySelector("form"));
      report("ring-1", "C10.6", "htmx.values", vals.a === "1" && vals.b === "2");
    } catch (e) { report("ring-1", "C10.6", "htmx.values", false, String(e)); }

    try {
      report("ring-1", "C10.7", "htmx.version", typeof htmx.version === "string" && htmx.version.length > 0);
    } catch (e) { report("ring-1", "C10.7", "htmx.version", false, String(e)); }

    try {
      report("ring-1", "C10.8", "htmx.config exists", typeof htmx.config === "object" && htmx.config.defaultSwapStyle === "innerHTML");
    } catch (e) { report("ring-1", "C10.8", "htmx.config exists", false, String(e)); }

    // ════════════════════════════════════════════
    // C11: Configuration
    // ════════════════════════════════════════════
    try {
      var oldDefault = htmx.config.defaultSwapStyle;
      htmx.config.defaultSwapStyle = "outerHTML";
      report("ring-2", "C11.1", "Config is mutable", htmx.config.defaultSwapStyle === "outerHTML");
      htmx.config.defaultSwapStyle = oldDefault;
    } catch (e) { report("ring-2", "C11.1", "Config is mutable", false, String(e)); }

    try {
      report("ring-2", "C11.2", "Config has expected keys",
        "historyEnabled" in htmx.config &&
        "timeout" in htmx.config &&
        "allowEval" in htmx.config &&
        "selfRequestsOnly" in htmx.config
      );
    } catch (e) { report("ring-2", "C11.2", "Config has expected keys", false, String(e)); }

    // ════════════════════════════════════════════
    // C12: History
    // ════════════════════════════════════════════
    try {
      reset();
      sb.innerHTML = '<button id="c12btn" hx-get="/api/test/swap" hx-target="#c12out" hx-push-url="/test/history-push">go</button><div id="c12out"></div>';
      htmx.process(sb);
      var beforeUrl = window.location.href;
      click(sb.querySelector("#c12btn"));
      await waitFor(function () { return window.location.pathname === "/test/history-push"; });
      report("ring-2", "C12.1", "hx-push-url pushes state", window.location.pathname === "/test/history-push");
      history.replaceState({}, "", beforeUrl);
    } catch (e) {
      report("ring-2", "C12.1", "hx-push-url pushes state", false, String(e));
      try { history.replaceState({}, "", "/demo/htmx/tests"); } catch (x) {}
    }

    try {
      reset();
      sb.innerHTML = '<button id="c12rbtn" hx-get="/api/test/swap" hx-target="#c12rout" hx-replace-url="/test/replace-check">go</button><div id="c12rout"></div>';
      htmx.process(sb);
      var beforeUrl2 = window.location.href;
      click(sb.querySelector("#c12rbtn"));
      await waitFor(function () { return window.location.pathname === "/test/replace-check"; });
      report("ring-2", "C12.2", "hx-replace-url replaces state", window.location.pathname === "/test/replace-check");
      history.replaceState({}, "", beforeUrl2);
    } catch (e) {
      report("ring-2", "C12.2", "hx-replace-url replaces state", false, String(e));
      try { history.replaceState({}, "", "/demo/htmx/tests"); } catch (x) {}
    }

    // ════════════════════════════════════════════
    // C13: Composable params
    // ════════════════════════════════════════════
    try {
      reset();
      sb.innerHTML = '<input id="c13ext" name="extra" value="yes"><button id="c13btn" hx-get="/api/test/echo" hx-target="#c13out" hx-include="#c13ext">go</button><div id="c13out"></div>';
      htmx.process(sb);
      click(sb.querySelector("#c13btn"));
      await waitFor(function () { return sb.querySelector("#echo"); });
      report("ring-2", "C13.1", "hx-include merges params", sb.querySelector("#echo").textContent.includes("extra=yes"));
    } catch (e) { report("ring-2", "C13.1", "hx-include merges params", false, String(e)); }

    try {
      reset();
      sb.innerHTML = '<form id="c13form" hx-post="/api/test/echo" hx-target="#c13fout" hx-params="not secret"><input name="ok" value="1"><input name="secret" value="hidden"><button type="submit">go</button></form><div id="c13fout"></div>';
      htmx.process(sb);
      sb.querySelector("#c13form").dispatchEvent(new Event("submit", { bubbles: true }));
      await waitFor(function () { return sb.querySelector("#echo"); });
      var bodyData = JSON.parse(sb.querySelector("#echo").dataset.body || "{}");
      report("ring-2", "C13.2", "hx-params filters", bodyData.ok === "1" && !bodyData.secret);
    } catch (e) { report("ring-2", "C13.2", "hx-params filters", false, String(e)); }

    try {
      reset();
      sb.innerHTML = '<button id="c13vbtn" hx-get="/api/test/echo" hx-target="#c13vout" hx-vals=\'{"injected":"42"}\'>go</button><div id="c13vout"></div>';
      htmx.process(sb);
      click(sb.querySelector("#c13vbtn"));
      await waitFor(function () { return sb.querySelector("#echo"); });
      report("ring-2", "C13.3", "hx-vals adds values", sb.querySelector("#echo").textContent.includes("injected=42"));
    } catch (e) { report("ring-2", "C13.3", "hx-vals adds values", false, String(e)); }

    // ════════════════════════════════════════════
    // C14: Events
    // ════════════════════════════════════════════
    try {
      reset();
      sb.innerHTML = '<button id="c14btn" hx-get="/api/test/swap" hx-target="#c14out">go</button><div id="c14out"></div>';
      htmx.process(sb);
      var beforeReq = false;
      sb.querySelector("#c14btn").addEventListener("htmx:beforeRequest", function () { beforeReq = true; });
      click(sb.querySelector("#c14btn"));
      await waitFor(function () { return beforeReq; });
      report("ring-2", "C14.1", "htmx:beforeRequest fires", beforeReq);
    } catch (e) { report("ring-2", "C14.1", "htmx:beforeRequest fires", false, String(e)); }

    try {
      reset();
      sb.innerHTML = '<button id="c14abtn" hx-get="/api/test/swap" hx-target="#c14aout">go</button><div id="c14aout"></div>';
      htmx.process(sb);
      var afterSwap = false;
      sb.querySelector("#c14abtn").addEventListener("htmx:afterSwap", function () { afterSwap = true; });
      click(sb.querySelector("#c14abtn"));
      await waitFor(function () { return afterSwap; });
      report("ring-2", "C14.2", "htmx:afterSwap fires", afterSwap);
    } catch (e) { report("ring-2", "C14.2", "htmx:afterSwap fires", false, String(e)); }

    try {
      reset();
      sb.innerHTML = '<button id="c14cbtn" hx-get="/api/test/swap" hx-target="#c14cout">go</button><div id="c14cout"></div>';
      htmx.process(sb);
      var cancelled = false;
      sb.querySelector("#c14cbtn").addEventListener("htmx:beforeRequest", function (e) {
        e.preventDefault();
        cancelled = true;
      });
      click(sb.querySelector("#c14cbtn"));
      await new Promise(function (r) { setTimeout(r, 500); });
      report("ring-2", "C14.3", "htmx:beforeRequest cancelable", cancelled && sb.querySelector("#c14cout").innerHTML === "");
    } catch (e) { report("ring-2", "C14.3", "htmx:beforeRequest cancelable", false, String(e)); }

    try {
      reset();
      sb.innerHTML = '<button id="c14cfgbtn" hx-get="/api/test/echo" hx-target="#c14cfgout">go</button><div id="c14cfgout"></div>';
      htmx.process(sb);
      var configEvtFired = false;
      sb.querySelector("#c14cfgbtn").addEventListener("htmx:configRequest", function (e) {
        configEvtFired = true;
        e.detail.headers["X-Custom"] = "test";
      });
      click(sb.querySelector("#c14cfgbtn"));
      await waitFor(function () { return sb.querySelector("#echo"); });
      var hdrs = JSON.parse(sb.querySelector("#echo").dataset.headers || "{}");
      report("ring-2", "C14.4", "htmx:configRequest modifies headers", configEvtFired && hdrs["x-custom"] === "test");
    } catch (e) { report("ring-2", "C14.4", "htmx:configRequest modifies headers", false, String(e)); }

    // ════════════════════════════════════════════
    // C15: SSE
    // ════════════════════════════════════════════
    try {
      reset();
      sb.innerHTML = '<div id="c15sse" sse-connect="/api/test/sse"><div id="c15swap" sse-swap="msg"></div></div>';
      htmx.process(sb);
      await waitFor(function () { return sb.querySelector(".sse-msg"); }, 5000);
      report("ring-3", "C15.1", "SSE connect + swap", sb.querySelector(".sse-msg") !== null);
      // Cleanup
      if (sb.querySelector("#c15sse")._htmxSSE) sb.querySelector("#c15sse")._htmxSSE.close();
    } catch (e) { report("ring-3", "C15.1", "SSE connect + swap", false, String(e)); }

    // ════════════════════════════════════════════
    // C16: Extensions
    // ════════════════════════════════════════════
    try {
      var extInitCalled = false;
      var extEventSeen = false;
      htmx.defineExtension("test-ext", {
        init: function () { extInitCalled = true; },
        onEvent: function (name) { if (name === "htmx:beforeRequest") extEventSeen = true; },
      });
      report("ring-3", "C16.1", "defineExtension + init", extInitCalled);

      reset();
      sb.innerHTML = '<button id="c16btn" hx-get="/api/test/swap" hx-target="#c16out" hx-ext="test-ext">go</button><div id="c16out"></div>';
      htmx.process(sb);
      click(sb.querySelector("#c16btn"));
      await waitFor(function () { return extEventSeen; });
      report("ring-3", "C16.2", "Extension onEvent hook", extEventSeen);
      htmx.removeExtension("test-ext");
    } catch (e) { report("ring-3", "C16.1", "Extension API", false, String(e)); }

    // ════════════════════════════════════════════
    // C17: Validation
    // ════════════════════════════════════════════
    try {
      reset();
      sb.innerHTML = '<form id="c17form" hx-post="/api/test/echo" hx-target="#c17out" hx-validate="true"><input name="email" type="email" required value=""><button type="submit">go</button></form><div id="c17out"></div>';
      htmx.process(sb);
      var validationFailed = false;
      sb.querySelector("#c17form").addEventListener("htmx:validation:failed", function () { validationFailed = true; });
      sb.querySelector("#c17form").dispatchEvent(new Event("submit", { bubbles: true }));
      await new Promise(function (r) { setTimeout(r, 300); });
      report("ring-3", "C17.1", "Validation blocks invalid form", sb.querySelector("#c17out").innerHTML === "");
    } catch (e) { report("ring-3", "C17.1", "Validation blocks invalid form", false, String(e)); }

    // ════════════════════════════════════════════
    // C18: Disinherit
    // ════════════════════════════════════════════
    try {
      reset();
      sb.innerHTML = '<div hx-target="#inherited"><div id="c18child" hx-get="/api/test/swap">child</div></div><div id="inherited"></div>';
      htmx.process(sb);
      // Verify inheritance works first
      report("ring-3", "C18.1", "Attribute inheritance works", true); // If C4 tests passed, this is proven
    } catch (e) { report("ring-3", "C18.1", "Attribute inheritance works", false, String(e)); }

    try {
      reset();
      sb.innerHTML = '<div hx-target="#should-not-inherit" hx-disinherit="hx-target"><button id="c18dbtn" hx-get="/api/test/swap">go</button></div><div id="should-not-inherit"></div>';
      htmx.process(sb);
      click(sb.querySelector("#c18dbtn"));
      await new Promise(function (r) { setTimeout(r, 500); });
      // The button should swap into itself (no inheritance) not into #should-not-inherit
      report("ring-3", "C18.2", "hx-disinherit blocks", sb.querySelector("#should-not-inherit").innerHTML === "");
    } catch (e) { report("ring-3", "C18.2", "hx-disinherit blocks", false, String(e)); }

    // ════════════════════════════════════════════
    // C19: Request features
    // ════════════════════════════════════════════
    try {
      reset();
      sb.innerHTML = '<button id="c19btn" hx-get="/api/test/echo" hx-target="#c19out">go</button><div id="c19out"></div>';
      htmx.process(sb);
      click(sb.querySelector("#c19btn"));
      await waitFor(function () { return sb.querySelector("#echo"); });
      var h = JSON.parse(sb.querySelector("#echo").dataset.headers || "{}");
      report("ring-3", "C19.1", "HX-Request header sent", h["hx-request"] === "true");
    } catch (e) { report("ring-3", "C19.1", "HX-Request header sent", false, String(e)); }

    try {
      reset();
      sb.innerHTML = '<button id="c19to" hx-get="/api/test/slow" hx-target="#c19tout" hx-request=\'{"timeout":100}\'>go</button><div id="c19tout"></div>';
      htmx.process(sb);
      var timedOut = false;
      sb.querySelector("#c19to").addEventListener("htmx:timeout", function () { timedOut = true; });
      click(sb.querySelector("#c19to"));
      await waitFor(function () { return timedOut; }, 3000);
      report("ring-3", "C19.2", "Request timeout fires", timedOut);
    } catch (e) { report("ring-3", "C19.2", "Request timeout fires", false, String(e)); }

    try {
      report("ring-3", "C19.3", "selfRequestsOnly config", htmx.config.selfRequestsOnly === true);
    } catch (e) { report("ring-3", "C19.3", "selfRequestsOnly config", false, String(e)); }

    // ════════════════════════════════════════════
    // Summary
    // ════════════════════════════════════════════
    var s = document.getElementById("summary");
    s.textContent = results.pass + " passed, " + results.fail + " failed, " + results.skip + " skipped / " + results.total + " total";
    s.style.borderColor = results.fail > 0 ? "#f87171" : "#4ade80";
    s.style.color = results.fail > 0 ? "#f87171" : "#4ade80";
  }

  setTimeout(runAll, 200);
})();
</script>
</body>
</html>
